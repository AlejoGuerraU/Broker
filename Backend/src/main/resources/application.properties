spring.application.name=broker-backend
server.port=${PORT:8080}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGINS:*}

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/broker_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# SQL initialization
spring.sql.init.mode=never

# Market data provider
# Claves: variable de entorno, archivo .env en Backend/ o application-local.properties (ver .example)
spring.config.import=optional:classpath:application-local.properties
alpha.vantage.api-key=${ALPHA_VANTAGE_API_KEY:}
finnhub.api-key=${FINNHUB_API_KEY:}

# JWT — token propio del backend
app.jwt.secret=${JWT_SECRET:broker_jwt_secret_cambia_esto_en_produccion_debe_ser_larga}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth — Client ID para verificar Google ID Tokens
google.client-ids=${GOOGLE_CLIENT_IDS:${GOOGLE_CLIENT_ID_LOCAL:${GOOGLE_CLIENT_ID:613176549351-nqb0d9oilhvq48sdjh72ioemfhifle0s.apps.googleusercontent.com}}}
